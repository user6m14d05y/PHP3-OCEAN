server {
    listen 8383;
    server_name _;

    # Upload file product 50MB
    client_max_body_size 50M;

    root /var/www/public;
    index index.php index.html;

    # Charset
    charset utf-8;

    # ==================== GZIP COMPRESSION ====================
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml
        text/javascript
        image/svg+xml;

    # ==================== LOGGING ====================
    # Tắt access log cho static files → giảm I/O disk
    access_log /var/log/nginx/backend_access.log;
    error_log  /var/log/nginx/backend_error.log;

    # ==================== STATIC FILES CACHE ====================
    # Cache ảnh, CSS, JS tĩnh → trình duyệt không cần tải lại
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ==================== LARAVEL SPA ROUTING ====================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ==================== WEBSOCKET (REVERB) ====================
    location /app {
        proxy_pass             http://backend:8383;
        proxy_set_header Host  $host;
        proxy_read_timeout     60;
        proxy_connect_timeout  60;
        proxy_redirect         off;

        # Bật cấu hình Upgrade để nâng cấp lên WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # ==================== PHP-FPM FASTCGI ====================
    location ~ \.php$ {

        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Buffer lớn hơn → tránh ghi temp file khi response lớn
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 32k;

        # Timeout cho request nặng (import Excel up to 10.000 rows)
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # ==================== SECURITY ====================
    location ~ /\.ht {
        deny all;
    }

    location ~ /\. {
        deny all;
    }
}
