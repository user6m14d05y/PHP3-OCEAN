server {
    listen 8383;
    server_name _;

    # Upload file product 50MB
    client_max_body_size 50M;

    root /var/www/public;
    index index.php index.html;

    # Charset
    charset utf-8;

    # ==================== GZIP COMPRESSION ====================
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml
        text/javascript
        image/svg+xml;

    # ==================== LOGGING ====================
