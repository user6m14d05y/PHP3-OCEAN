services:
  # CƠ SỞ DỮ LIỆU
  db:
    image: mysql:8.0
    container_name: ocean_mysql
    restart: always
    ports:
      - "8306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ocean_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    # Thêm Healthcheck để các service khác biết DB đã thực sự sẵn sàng
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # BACKEND LARAVEL (PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocean_backend
    restart: always
    # Không expose port 8383 ra ngoài nữa, vì web server (nginx) sẽ đứng trước
    expose:
      - "9000"
    env_file:
      - .env
    # Giữ nguyên volume để Dev dùng hot-reload
    volumes:
      - ./backend:/var/www
      - ./.env:/var/www/.env
    # Bắt buộc đợi DB healthcheck xong mới start
    depends_on:
      db:
        condition: service_healthy

  # NGINX (WEB SERVER CHO BACKEND)
  # Đóng vai trò Reverse Proxy (FastCGI) gọi đến backend:9000
  nginx_backend:
    image: nginx:alpine
    container_name: ocean_nginx_backend
    restart: always
    ports:
      - "8383:8383"
    volumes:
      # Map config Nginx
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
      # Nginx cũng cần thấy thư mục public của Laravel để check static file
      - ./backend:/var/www:ro
    depends_on:
      - backend

  # FRONTEND VUEJS
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Target build cho MÔI TRƯỜNG DEV (Bỏ qua Nginx stage, giữ nguyên luồng cũ)
      target: build-stage
    container_name: ocean_frontend
    restart: always
    ports:
      - "3302:3302"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      # Ẩn node_modules host, ép container dùng node_modules của chính nó
      - /app/node_modules
      - ./.env:/app/.env
    working_dir: /app
    # Ghi đè CMD của Dockerfile để chạy Dev server thay vì Nginx
    command: npm run dev -- --host 0.0.0.0 --port 3302

volumes:
  mysql_data: