services:
  # CƠ SỞ DỮ LIỆU
  db:
    image: mysql:8.0
    container_name: ocean_mysql
    restart: always
    ports:
      - "8306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ocean_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/custom.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # BACKEND LARAVEL (PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocean_backend
    restart: always
    expose:
      - "9000"
    env_file:
      - .env
    environment:
      CACHE_STORE: file
    volumes:
      - ./backend:/var/www
      - ./.env:/var/www/.env
      - /var/www/vendor          # Tránh dùng vendor từ Windows host → dùng vendor Linux trong container
    depends_on:
      db:
        condition: service_healthy

  # NGINX FOR BACKEND
  nginx_backend:
    image: nginx:alpine
    container_name: ocean_nginx_backend
    restart: always
    ports:
      - "8383:8383"
    volumes:
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www:ro
    depends_on:
      - backend

  # FRONTEND VUEJS
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build-stage
    container_name: ocean_frontend
    restart: always
    ports:
      - "3302:3302"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./.env:/app/.env
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3302"

volumes:
  mysql_data: