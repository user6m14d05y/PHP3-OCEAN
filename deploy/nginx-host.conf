# ============================================
# Nginx Host Reverse Proxy — ocean.pro.vn
# File: /etc/nginx/sites-available/ocean
# ============================================

# ── Frontend: ocean.pro.vn ──
server {
    listen 80;
    server_name ocean.pro.vn www.ocean.pro.vn;

    # Frontend Vue.js (static build served by Docker/Nginx on port 8081)
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── API + WebSocket: api.ocean.pro.vn ──
server {
    listen 80;
    server_name api.ocean.pro.vn;

    client_max_body_size 100M;

    # API Laravel (PHP-FPM via Docker/Nginx on port 8383)
    location / {
        proxy_pass http://127.0.0.1:8383;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts cho các request lâu (upload, report, etc.)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 100s;
    }

    # WebSocket (Laravel Reverb)
    location /app {
        proxy_pass http://127.0.0.1:8383;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Storage files
    location /storage {
        proxy_pass http://127.0.0.1:8383/storage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
